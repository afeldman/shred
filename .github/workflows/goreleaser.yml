name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Install gotofish
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://raw.githubusercontent.com/afeldman/scripts/master/gotofish \
            -o "$HOME/.local/bin/gotofish"
          chmod +x "$HOME/.local/bin/gotofish"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Update fish-food
        run: gotofish gen --release shred --desc "Secure file deletion (Gutmann, DoD, VSITR)"
        env:
          FISH_FOOD_TOKEN: ${{ secrets.FISH_FOOD_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
